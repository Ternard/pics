name: pics
description: A private event-based photo sharing app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI and Core
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  flutter_web_plugins:
    sdk: flutter
  
  # Supabase
  supabase_flutter: ^2.8.4
  
  # Camera and Photos
  camera: ^0.11.0
  path_provider: ^2.1.5
  path: ^1.9.0
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  video_player: ^2.9.2
  image_gallery_saver: ^2.0.3
  connectivity_plus: ^6.1.0
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

# Flutter Launcher Icons configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#F5E1BE"
    theme_color: "#8B4513"
  windows:
    generate: true
    image_path: "assets/logo.png"
  macos:
    generate: true
    image_path: "assets/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
